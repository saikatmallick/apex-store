<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Store</title>
    <script>
      // Self-healing interceptor for nested iframe/sandbox environments where window.fetch has only a getter.
      // This prevents fatal crashes when third-party libraries attempt simple assignments like "window.fetch = ...", "self.fetch = ...", etc.
      (function() {
        try {
          var originalFetch = window.fetch || self.fetch || globalThis.fetch;
          var currentFetch = originalFetch;

          function getFetch() {
            return currentFetch;
          }

          function setFetch(val) {
            currentFetch = val;
          }

          var targets = [window, self, globalThis];
          if (typeof Window !== 'undefined' && Window.prototype) {
            targets.push(Window.prototype);
          }

          targets.forEach(function(target) {
            if (!target) return;
            try {
              // Try to delete the existing property (or prototype property) to clear getter-only restrictions if possible
              try {
                delete target.fetch;
              } catch (err) {}

              Object.defineProperty(target, 'fetch', {
                get: getFetch,
                set: setFetch,
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              // Fail-safe: try to assign directly if defineProperty is blocked
              try {
                target.fetch = currentFetch;
              } catch (err) {}
            }
          });
        } catch (globalError) {
          console.warn("[FETCH SHIM WARNING] Failed to apply configurable fetch properties.", globalError);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
